name: Build images-khaddict

on:
  push:
    branches: [main]
    paths:
      - "images-build/images/**"
      - "images-build/Dockerfile"
      - "images-build/process-icons.sh"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: echo "value=0.1.$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: images-build
          push: true
          tags: |
            ghcr.io/khaddict/images-khaddict:${{ steps.sha.outputs.short }}
            ghcr.io/khaddict/images-khaddict:${{ steps.version.outputs.value }}
            ghcr.io/khaddict/images-khaddict:latest
