en:
  title.projects: "Projects | khaddict"
  projects.title: 'Things I <span class="highlight">build</span> and run.'
  projects.voidnode: "Single-node homelab: Proxmox as the hypervisor, Kubernetes for container orchestration, OPNsense for network segmentation, SaltStack for configuration management. Less redundant than my former homelab project."
  projects.khaddictcom: "Static HTML/CSS/JS for the khaddict.com subdomains (www, blog, images, projects), packaged as a Helm subchart integrated into voidnode."
  projects.homelab: "My former three-node highly-available homelab: Proxmox as the hypervisor, Kubernetes for container orchestration, Ceph for distributed storage. More redundant than my current project, voidnode."
  projects.homelabcloud: "Goes hand in hand with my old homelab. Deploys ArgoCD resources on the Kubernetes cluster."
  projects.easypki: "Internal PKI authority issuing and renewing TLS certificates for every *.khaddict.lab service, provisioned via StackStorm and distributed via SaltStack."
  projects.voidpath: "A HackTheBox machine I created. Not released yet, this card will be updated with a link once it drops."
  projects.comingSoon: "Not released yet"
