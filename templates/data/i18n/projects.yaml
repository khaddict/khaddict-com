en:
  title.projects: "Projects | khaddict"
  projects.title: 'Things I <span class="highlight">build</span> and run.'
  projects.voidnode: "Single-node homelab running Talos Kubernetes, ArgoCD and SaltStack. The current, leaner setup after retiring a three-node HA cluster."
  projects.khaddictcom: "Static site content for the khaddict.com family (www, blog, images, projects), packaged as a Helm subchart consumed by voidnode."
  projects.homelab: "The original three-node HA homelab: Kubernetes on bare metal with Ceph for distributed storage. Retired in favor of voidnode's single-node setup."
  projects.homelabcloud: "Companion repository to homelab, covering the cloud-facing side of the original three-node HA setup."
  projects.easypki: "Internal PKI authority issuing and renewing TLS certificates for every *.khaddict.lab service, provisioned via StackStorm and distributed via SaltStack."
  projects.voidpath: "A HackTheBox machine I created. Not released yet, this card will be updated with a link once it drops."
  projects.comingSoon: "Not released yet"
fr:
